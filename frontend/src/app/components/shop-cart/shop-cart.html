<div class="cart-container">
  @if(serveralCartItem && serveralCartItem.length > 0) {
    <div class="cart-header">
      <h1>Mon Panier</h1>
      <button 
        class="btn-clear" 
        (click)="clearCart()"
        type="button"
        aria-label="Vider complètement le panier"
      >
        Vider le panier
      </button>
    </div>

    <table class="cart-table" role="table" aria-label="Panier d'achat">
      <thead>
        <tr>
          <th scope="col">Nom du Produit</th>
          <th scope="col">Quantité</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody>
        @for(item of serveralCartItem; track item._id) {
          <tr>
            <td data-label="Nom du Produit">{{ item.product_id.name }}</td>
            <td data-label="Quantité">{{ item.quantity }}</td>
            <td data-label="Action">
              <button 
                class="btn-remove" 
                (click)="removeFromCart(item._id)"
                type="button"
                [attr.aria-label]="'Supprimer ' + item.product_id.name + ' du panier'"
              >
                Supprimer
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <p class="empty-cart">Votre panier est vide</p>
  }
</div>
