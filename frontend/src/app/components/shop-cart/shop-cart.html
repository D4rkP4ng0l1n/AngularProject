<div class="cart-container">
  @if(serveralCartItem && serveralCartItem.length > 0) {
    <div class="cart-header">
      <h1>Mon Panier</h1>
      <button class="btn-clear" (click)="clearCart()"> Vider le panier</button>
    </div>

    <table class="cart-table">
      <thead>
        <tr>
          <th>Nom du Produit</th>
          <th>Quantité</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for(item of serveralCartItem; track item._id) {
          <tr>
            <td>{{ item.product_id.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>
              <button class="btn-remove" (click)="removeFromCart(item._id)">
                Supprimer
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <p class="empty-cart">Votre panier est vide</p>
  }
</div>
